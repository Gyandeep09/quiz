<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interactive Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F4EE;
    --ink:#0F1115;
    --muted:#6B6F76;
    --line:#E4E0D6;
    --accent:#FF5A1F;
    --accent-soft:#FFE8DE;
    --correct:#1F8A5B;
    --correct-soft:#E1F2EA;
    --wrong:#B33A3A;
    --wrong-soft:#F7E3E3;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);font-family:'Inter Tight',system-ui,sans-serif;color:var(--ink);-webkit-font-smoothing:antialiased;min-height:100%;}

  
  @keyframes fadeUp{ from{opacity:0;transform:translateY(18px);} to{opacity:1;transform:translateY(0);} }
  @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
  @keyframes pulseGreen{
    0%{box-shadow:0 0 0 0 rgba(31,138,91,.35);}
    70%{box-shadow:0 0 0 16px rgba(31,138,91,0);}
    100%{box-shadow:0 0 0 0 rgba(31,138,91,0);}
  }
  @keyframes shake{
    0%,100%{transform:translateX(0);}
    20%{transform:translateX(-7px);}
    40%{transform:translateX(7px);}
    60%{transform:translateX(-5px);}
    80%{transform:translateX(5px);}
  }
  @keyframes popIn{ from{opacity:0;transform:scale(.6);} to{opacity:1;transform:scale(1);} }

  
  .stage{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:48px 24px;
    position:relative;
    overflow:hidden;
  }
  .accent-strip{position:fixed;left:0;top:0;width:14px;height:100%;background:var(--accent);z-index:5;}
  .blob{
    position:fixed;right:-180px;top:-200px;width:720px;height:720px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--accent-soft) 0%, rgba(255,232,222,0) 70%);
    z-index:0;pointer-events:none;
  }

  .card-wrap{
    position:relative;z-index:2;
    width:100%;max-width:1240px;
  }

  
  .eyebrow{
    display:flex;align-items:center;gap:18px;font-size:clamp(13px,1.1vw,18px);
    letter-spacing:.24em;text-transform:uppercase;color:var(--muted);font-weight:600;
    animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) both;
  }
  .pill{display:inline-block;padding:7px 15px;background:var(--ink);color:#fff;border-radius:999px;letter-spacing:.22em;}
  .eyebrow .qnum{color:var(--ink);}
  .eyebrow .spacer{flex:1;height:1px;background:var(--line);}
  .eyebrow .total{color:var(--muted);}

  .category{
    font-family:'Instrument Serif',serif;font-style:italic;font-weight:400;
    color:var(--accent);font-size:clamp(22px,2.2vw,30px);margin:22px 0 14px;
    animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) .1s both;
  }

  .question{
    font-size:clamp(32px,5vw,72px);line-height:1.08;font-weight:600;letter-spacing:-.02em;
    margin:0 0 6px;animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) .2s both;
  }
  .question .hl{color:var(--accent);}

  .progress-track{position:relative;height:6px;background:var(--line);border-radius:3px;margin:40px 0 36px;}
  .progress-fill{position:absolute;left:0;top:0;height:6px;background:var(--accent);border-radius:3px;transition:width .6s cubic-bezier(.7,0,.3,1);}

  .options{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  @media (max-width:760px){ .options{grid-template-columns:1fr;} }

  .opt{
    position:relative;text-align:left;cursor:pointer;
    background:#fff;border:2px solid var(--line);border-radius:18px;
    padding:28px 28px 26px 130px;min-height:150px;
    transition:border-color .25s ease, background .25s ease, transform .12s ease, box-shadow .25s ease;
    font-family:inherit;width:100%;
    animation:fadeUp .5s cubic-bezier(.2,.7,.2,1) both;
  }
  .opt:nth-child(1){animation-delay:.30s;}
  .opt:nth-child(2){animation-delay:.40s;}
  .opt:nth-child(3){animation-delay:.50s;}
  .opt:nth-child(4){animation-delay:.60s;}

  .opt:not([disabled]):hover{border-color:var(--ink);transform:translateY(-2px);box-shadow:0 10px 28px rgba(15,17,21,.08);}
  .opt[disabled]{cursor:default;}

  .opt-letter{
    position:absolute;left:24px;top:50%;transform:translateY(-50%);
    width:80px;height:80px;border-radius:14px;background:#fff;border:2px solid var(--ink);color:var(--ink);
    display:flex;align-items:center;justify-content:center;font-size:34px;font-weight:700;
    font-family:'Instrument Serif',serif;font-style:italic;transition:all .3s ease;
  }
  .opt-title{font-size:clamp(24px,2.6vw,36px);font-weight:500;letter-spacing:-.01em;line-height:1.1;}
  .opt-sub{font-size:clamp(15px,1.4vw,20px);color:var(--muted);margin-top:8px;}

  .badge{
    position:absolute;right:24px;top:50%;transform:translateY(-50%) scale(.6);opacity:0;
    width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  }
  .badge svg{stroke:#fff;}

  
  .opt.selected{border-color:var(--accent);background:var(--accent-soft);}
  .opt.selected .opt-letter{background:var(--accent);border-color:var(--accent);color:#fff;}

  .opt.correct{background:var(--correct-soft);border-color:var(--correct);animation:pulseGreen 1.4s ease 1 both;}
  .opt.correct .opt-letter{background:var(--correct);border-color:var(--correct);color:#fff;}
  .opt.correct .badge{background:var(--correct);opacity:1;transform:translateY(-50%) scale(1);transition:all .35s cubic-bezier(.2,.7,.2,1);}

  .opt.wrong{background:var(--wrong-soft);border-color:var(--wrong);animation:shake .5s ease 1 both;}
  .opt.wrong .opt-letter{background:var(--wrong);border-color:var(--wrong);color:#fff;}
  .opt.wrong .badge{background:var(--wrong);opacity:1;transform:translateY(-50%) scale(1);transition:all .35s cubic-bezier(.2,.7,.2,1);}

  .opt.dimmed{opacity:.5;}

 
  .footer{margin-top:36px;display:flex;align-items:center;justify-content:space-between;gap:24px;flex-wrap:wrap;min-height:56px;}
  .reveal-caption{display:flex;align-items:center;gap:14px;font-size:clamp(16px,1.6vw,22px);color:var(--muted);max-width:820px;}
  .reveal-caption.show{animation:fadeUp .5s ease both;}
  .dot{width:10px;height:10px;border-radius:50%;flex:none;}
  .reveal-caption strong{color:var(--ink);font-weight:600;}

  .btn{
    font-family:inherit;font-size:clamp(16px,1.5vw,20px);font-weight:600;cursor:pointer;
    padding:16px 34px;border-radius:999px;border:2px solid var(--ink);background:var(--ink);color:#fff;
    transition:transform .12s ease, opacity .2s ease, background .2s ease;letter-spacing:.01em;white-space:nowrap;
    display:inline-flex;align-items:center;gap:10px;
  }
  .btn:hover{transform:translateY(-2px);}
  .btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}
  .btn.ghost{background:transparent;color:var(--ink);}

  .results{position:relative;z-index:2;width:100%;max-width:900px;text-align:center;animation:fadeUp .6s cubic-bezier(.2,.7,.2,1) both;}
  .results .pill{margin-bottom:28px;}
  .score-big{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(80px,16vw,200px);line-height:1;font-weight:400;}
  .score-big .of{color:var(--muted);}
  .results h1{font-size:clamp(30px,5vw,64px);font-weight:600;letter-spacing:-.02em;margin:18px 0 6px;}
  .results p{font-size:clamp(17px,2vw,24px);color:var(--muted);margin:0 auto 36px;max-width:640px;line-height:1.4;}
  .results .accent{color:var(--accent);}

  .breakdown{display:flex;justify-content:center;gap:10px;margin:0 0 40px;flex-wrap:wrap;}
  .bchip{width:18px;height:18px;border-radius:50%;border:2px solid var(--line);animation:popIn .4s ease both;}
  .bchip.ok{background:var(--correct);border-color:var(--correct);}
  .bchip.no{background:var(--wrong);border-color:var(--wrong);}

  .hidden{display:none !important;}
</style>
</head>
<body>

<div class="blob"></div>

<body>

<div class="accent-strip"></div>
<div class="blob"></div>

<main class="stage">

  <section class="card-wrap" id="quizView" aria-live="polite">

    <header class="eyebrow" id="eyebrow">
      <span class="pill">QUIZ</span>
      <span class="qnum" id="qNum">Question 01</span>
      <span class="spacer"></span>
      <span class="total" id="qTotal">of 09</span>
    </header>

    <p class="category" id="category">Category</p>

    <h1 class="question" id="question">Question text</h1>

    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>

    <div class="options" id="options" role="radiogroup" aria-label="Answer options"></div>

    <footer class="footer">
      <div class="reveal-caption hidden" id="revealCaption">
        <span class="dot" id="captionDot"></span>
        <span id="captionText"></span>
      </div>
      <div style="display:flex;gap:14px;margin-left:auto;">
        <button class="btn" id="actionBtn" disabled>Show answer</button>
      </div>
    </footer>

  </section>

  <section class="results hidden" id="resultsView">
    <span class="pill">QUIZ COMPLETE</span>
    <div class="score-big"><span id="scoreNum">0</span><span class="of">/<span id="scoreTotal">9</span></span></div>
    <h1 id="resultTitle">Nice work!</h1>
    <p id="resultMsg">You finished the quiz.</p>
    <div class="breakdown" id="breakdown"></div>
    <button class="btn" id="restartBtn">↻ Try again</button>
  </section>

</main>

    ],
    correct: 2,
    answer: "School heads — They provide leadership, planning, and supervision for effective school development."
  }
];

const LETTERS = ["A","B","C","D"];
const CHECK_SVG = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
const X_SVG     = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>';

/* ---------------- State ---------------- */
let current = 0;
let selected = null;   // index chosen by user
let revealed = false;  // has answer been shown
let score = 0;
const results = [];    // booleans per question

/* ---------------- Elements ---------------- */
const el = id => document.getElementById(id);
const optionsEl = el('options');

/* ---------------- Render a question ---------------- */
function pad(n){ return String(n).padStart(2,'0'); }

function buildQuestionHTML(parts){
  return parts.map(p => typeof p === 'string' ? p : `<span class="hl">${p.hl}</span>`).join('');
}

function renderQuestion(){
  const q = QUESTIONS[current];
  selected = null;
  revealed = false;

  el('qNum').textContent = 'Question ' + pad(current + 1);
  el('qTotal').textContent = 'of ' + pad(QUESTIONS.length);
  el('category').textContent = q.category;
  el('question').innerHTML = buildQuestionHTML(q.text);

  // progress reflects questions answered
  el('progressFill').style.width = ((current) / QUESTIONS.length * 100) + '%';

  // reset footer
  const cap = el('revealCaption');
  cap.classList.add('hidden');
  cap.classList.remove('show');
  const btn = el('actionBtn');
  btn.textContent = 'Show answer';
  btn.disabled = true;

  // build options
  optionsEl.innerHTML = '';
  q.options.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'opt';
    b.type = 'button';
    b.setAttribute('role','radio');
    b.setAttribute('aria-checked','false');
    b.dataset.index = i;
    b.innerHTML =
      `<span class="opt-letter">${LETTERS[i]}</span>
       <span class="opt-title">${opt.title}</span>
       <span class="opt-sub">${opt.sub}</span>
       <span class="badge"></span>`;
    b.addEventListener('click', () => selectOption(i));
    optionsEl.appendChild(b);
  });
}

/* ---------------- Selection ---------------- */
function selectOption(i){
  if (revealed) return;
  selected = i;
  [...optionsEl.children].forEach((b, idx) => {
    b.classList.toggle('selected', idx === i);
    b.setAttribute('aria-checked', idx === i ? 'true' : 'false');
  });
  el('actionBtn').disabled = false;
}

/* ---------------- Reveal ---------------- */
function revealAnswer(){
  if (selected === null || revealed) return;
  revealed = true;
  const q = QUESTIONS[current];
  const isCorrect = selected === q.correct;
  if (isCorrect) score++;
  results.push(isCorrect);

  [...optionsEl.children].forEach((b, idx) => {
    b.disabled = true;
    b.classList.remove('selected');
    if (idx === q.correct){
      b.classList.add('correct');
      b.querySelector('.badge').innerHTML = CHECK_SVG;
    } else if (idx === selected){
      b.classList.add('wrong');
      b.querySelector('.badge').innerHTML = X_SVG;
    } else {
      b.classList.add('dimmed');
    }
  });

  // fill progress to include this answered question
  el('progressFill').style.width = ((current + 1) / QUESTIONS.length * 100) + '%';

  // caption
  const cap = el('revealCaption');
  el('captionDot').style.background = isCorrect ? 'var(--correct)' : 'var(--wrong)';
  el('captionText').innerHTML =
    `<strong>${isCorrect ? 'Correct!' : 'Not quite.'}</strong> ${q.answer}`;
  cap.classList.remove('hidden');
  cap.classList.add('show');

  // action button -> next / results
  const btn = el('actionBtn');
  btn.disabled = false;
  btn.textContent = (current === QUESTIONS.length - 1) ? 'See results →' : 'Next question →';
}

/* ---------------- Action button ---------------- */
el('actionBtn').addEventListener('click', () => {
  if (!revealed){
    revealAnswer();
  } else if (current === QUESTIONS.length - 1){
    showResults();
  } else {
    current++;
    renderQuestion();
    window.scrollTo({top:0, behavior:'smooth'});
  }
});

/* ---------------- Results ---------------- */
function showResults(){
  el('quizView').classList.add('hidden');
  const view = el('resultsView');
  view.classList.remove('hidden');

  el('scoreNum').textContent = score;
  el('scoreTotal').textContent = QUESTIONS.length;

  const pct = score / QUESTIONS.length;
  let title, msg;
  if (pct === 1){ title = 'Flawless! 🏆'; msg = 'A perfect score — you answered every single question correctly.'; }
  else if (pct >= 0.6){ title = 'Well played! 👏'; msg = 'A solid result. A little brushing up and you\'ll ace it next time.'; }
  else if (pct >= 0.3){ title = 'Not bad! 🙂'; msg = 'You got a few — give it another go to climb the scoreboard.'; }
  else { title = 'Keep going! 💪'; msg = 'Everyone starts somewhere. Replay and watch your score grow.'; }
  el('resultTitle').innerHTML = title;
  el('resultMsg').innerHTML = msg;

  const bd = el('breakdown');
  bd.innerHTML = '';
  results.forEach((ok, i) => {
    const c = document.createElement('span');
    c.className = 'bchip ' + (ok ? 'ok' : 'no');
    c.style.animationDelay = (i * 0.08) + 's';
    c.title = 'Question ' + (i+1) + (ok ? ' · correct' : ' · wrong');
    bd.appendChild(c);
  });
}

el('restartBtn').addEventListener('click', () => {
  current = 0; selected = null; revealed = false; score = 0;
  results.length = 0;
  el('resultsView').classList.add('hidden');
  el('quizView').classList.remove('hidden');
  renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
});

/* keyboard support: A-D to pick, Enter to advance */
document.addEventListener('keydown', (e) => {
  if (!el('quizView').classList.contains('hidden')){
    const k = e.key.toUpperCase();
    const idx = LETTERS.indexOf(k);
    if (idx > -1 && idx < QUESTIONS[current].options.length && !revealed){
      selectOption(idx);
    } else if (e.key === 'Enter' && !el('actionBtn').disabled){
      el('actionBtn').click();
    }
  }
});

/* init */
renderQuestion();
</script>
</body>
</html>
